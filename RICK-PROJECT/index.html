<!doctype html>
<html lang="en">
<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>You’ve Been Invited 💍</title>
  <meta name="theme-color" content="#000000" />

  <!-- Link Preview bait (edit as you like) -->
  <meta property="og:title" content="Your Access Link: The Ring" />
  <meta property="og:description" content="Tap to view. Mobile-optimized." />
  <meta property="og:image" content="poster.jpg" />
  <meta property="og:type" content="website" />

  <style>
    :root { --accent:#ffbd59; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: #000; color:#fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }

    /* Full-bleed video */
    .wrap { position: fixed; inset: 0; }
    video {
      width: 100%; height: 100%;
      object-fit: cover; display: block; background:#000;
    }

    /* Overlay for “tap for sound” */
    .overlay {
      position: fixed; inset: 0;
      display: grid; place-items: end center;
      padding: max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent 40%);
      transition: opacity .25s ease;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .cta {
      pointer-events: auto;
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 12px 16px; border-radius: 999px;
      font-weight: 700; letter-spacing: .2px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      user-select: none;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

    /* Tiny status pill */
    .badge {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      right: 12px;
      font-size: 12px; opacity:.85;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px; padding: 6px 10px;
    }

    /* Optional subtle loader text for the first second */
    .intro {
      position: fixed; inset: 0; display:grid; place-items:center;
      color:#ddd; font-weight:600; letter-spacing:.3px;
      opacity: 0; animation: pop .6s .2s both;
      text-shadow: 0 2px 20px rgba(0,0,0,.5);
    }
    @keyframes pop { from { opacity:0 } to { opacity:1 } }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Keep playsinline to avoid forced fullscreen on iOS. Start muted for mobile policy. -->
    <video id="vid" playsinline autoplay muted loop preload="auto" poster="poster.jpg">
      <source src="videoplayback.mp4" type="video/mp4" />
      Your browser doesn’t support MP4 playback.
    </video>
  </div>

  <div id="badge" class="badge">Autoplay · Muted</div>

  <div class="intro" id="intro">Loading…</div>

  <div class="overlay" id="overlay">
    <button class="cta" id="cta">
      <span class="dot" aria-hidden="true"></span> 🔊 Tap for sound
    </button>
  </div>

  <script>
    (function () {
      const v = document.getElementById('vid');
      const overlay = document.getElementById('overlay');
      const cta = document.getElementById('cta');
      const badge = document.getElementById('badge');
      const intro = document.getElementById('intro');

      // Try to play immediately (desktop may allow sound right away)
      const attemptPlayWithSound = async () => {
        try {
          v.muted = false;
          await v.play();
          // If it worked, hide overlay
          overlay.classList.add('hidden');
          badge.textContent = 'Playing · Sound on';
        } catch {
          // If blocked, go muted and keep rolling
          v.muted = true;
          try { await v.play(); } catch {}
          overlay.classList.remove('hidden');
          badge.textContent = 'Autoplay · Muted';
        }
      };

      const firstTry = () => {
        if (v.readyState >= 2) attemptPlayWithSound();
        else v.addEventListener('loadeddata', attemptPlayWithSound, { once: true });
      };

      // Desktop can sometimes autoplay w/ sound; mobile won’t. Try anyway.
      firstTry();

      // On ANY user interaction, immediately unmute + play.
      let armed = true;
      const armDisarm = async () => {
        if (!armed) return;
        armed = false;
        try {
          v.muted = false;
          // Some phones need a tiny volume nudge to “count” as change.
          v.volume = 1.0;
          await v.play();
          overlay.classList.add('hidden');
          badge.textContent = 'Playing · Sound on';
        } catch {
          // If it still fails (rare), re-arm and keep overlay visible
          armed = true;
        }
      };

      // Consider everything an interaction:
      ['pointerdown','click','touchstart','keydown','scroll'].forEach(evt => {
        window.addEventListener(evt, armDisarm, { passive: true });
      });

      // Button explicitly does the same
      cta.addEventListener('click', armDisarm);

      // Reflect mute changes if the user toggles via native controls (if you add them)
      v.addEventListener('volumechange', () => {
        const on = !v.muted && v.volume > 0;
        badge.textContent = on ? 'Playing · Sound on' : 'Autoplay · Muted';
        overlay.classList.toggle('hidden', on);
      });

      // Clean up the intro label after a moment
      setTimeout(() => intro.style.display = 'none', 1200);
    })();
  </script>
</body>
</html>
